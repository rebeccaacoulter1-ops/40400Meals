<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>40/400 Meals | High Protein Recipes</title>

    <style>

        body{
            margin:0;
            font-family:Arial, Helvetica, sans-serif;
            background:#faf8f5;
            color:#333;
        }

        header{
            background:white;
            padding:20px 40px;
            box-shadow:0 2px 10px rgba(0,0,0,.08);
        }

        .hero{
            text-align:center;
            padding:80px 20px;
            max-width:900px;
            margin:auto;
        }

        h1{
            font-size:64px;
            margin-bottom:10px;
        }

        h2{
            font-size:30px;
            font-weight:normal;
            color:#666;
        }

        .stats{
            display:flex;
            justify-content:center;
            gap:50px;
            margin:50px 0;
            flex-wrap:wrap;
        }

        .stat{
            background:white;
            padding:25px;
            border-radius:15px;
            width:180px;
            box-shadow:0 5px 15px rgba(0,0,0,.08);
        }

        .stat h3{
            font-size:40px;
            margin:0;
            color:#8B4513;
        }

        .button{
            display:inline-block;
            margin-top:30px;
            padding:18px 40px;
            background:#8B4513;
            color:white;
            text-decoration:none;
            border-radius:50px;
            font-size:20px;
            font-weight:bold;
        }

        section{
            max-width:1100px;
            margin:auto;
            padding:70px 20px;
        }

        .recipes{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
            gap:25px;
        }

        .card{
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 5px 15px rgba(0,0,0,.08);
            text-align:center;
        }

        footer{
            background:#222;
            color:white;
            text-align:center;
            padding:40px;
            margin-top:60px;
        }

    </style>

</head>

<body>

<header>

<h2>40/400 Meals</h2>

</header>

<div class="hero">

<h1>High Protein Meals</h1>

<h2>40g Protein • Around 400 Calories • Ready Fast</h2>

<div class="stats">

<div class="stat">
<h3>40g</h3>
Protein
</div>

<div class="stat">
<h3>400</h3>
Calories
</div>

<div class="stat">
<h3>10</h3>
Minutes
</div>

</div>

<a href="#" class="button">
Browse Recipes
</a>

</div>

<section>

<h2 style="text-align:center;">Featured Recipes</h2>

<div class="recipes">

<div class="card">
🍫
<h3>Chocolate Mug Cake</h3>
</div>

<div class="card">
🌮
<h3>Taco Bowl</h3>
</div>

<div class="card">
🍕
<h3>Protein Pizza</h3>
</div>

</div>

</section>

<footer>

<p>© 2026 40/400 Meals</p>

<p>Powered by Bear OS</p>

</footer>

</body>

</html>
