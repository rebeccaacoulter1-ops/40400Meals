name: Generate Recipe Pages

on:
  push:
    paths:
      - "recipes/*.json"
      - "templates/recipe-template.html"
      - "tools/generate_recipe.py"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate recipe pages
        run: python tools/generate_recipe.py
        
      - name: Generate social content
        run: python tools/generate_social_content.py

      - name: Commit generated pages
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Generate recipe pages
          file_pattern: |
            recipes/*.html
            outputs/**
