name: Generate Recipe Pages

on:
  push:
    paths:
      - "recipes/*.json"
      - "templates/recipe-template.html"
      - "tools/**"
      - "requirements.txt"
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Bear OS Generator Engine
        run: python tools/run_bear_os.py
        env:
          MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Commit generated pages
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Bear OS generated content
          file_pattern: |
            index.html
            recipes/*.html
            recipes/*.json
            outputs/**/*.txt
            outputs/**/*.json
            outputs/**/*.png
          add_options: '-A'
