name: Generate Recipe Pages

on:
  push:
    paths:
      - "recipes/*.json"
      - "templates/recipe-template.html"
      - "tools/**"
      - "memory/**"
      - "requirements.txt"
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Bear OS Generator Engine
        run: python tools/run_bear_os.py
        env:
          MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Debug generated files
        run: |
          echo "===== RECIPES FOLDER ====="
          ls -la recipes
          echo ""
          echo "===== HTML FILES ====="
          find recipes -name "*.html"
          echo ""
          echo "===== BEAR MEMORY ====="
          cat memory/bear_manifest.json
          echo ""
          echo "===== GIT STATUS ====="
          git status

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Bear OS generated content" || echo "No changes to commit"
          git pull --rebase origin main
          git push origin main
