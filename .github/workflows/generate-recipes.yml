name: Generate Recipe Pages

on:
  push:
    paths:
      - "recipes/*.json"
      - "templates/recipe-template.html"
      - "tools/**"
      - "requirements.txt"
      - ".github/workflows/**"
  workflow_dispatch:

concurrency:
  group: bear-os-generator
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate Bear OS content
        run: python tools/run_bear_os.py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Debug generated files
        run: |
          echo "===== RECIPES FOLDER ====="
          ls -la recipes
          echo ""
          echo "===== HTML FILES ====="
          find recipes -name "*.html"
          echo ""
          echo "===== BEAR MEMORY ====="
          cat memory/bear_manifest.json
          echo ""
          echo "===== GIT STATUS ====="
          git status

      - name: Commit generated content
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "Bear OS generated content"
            git pull --no-rebase -X ours origin main
            git push origin main
          fi

      - name: Publish ready Pinterest pins
        run: python tools/send_to_make.py
        env:
          MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
          SITE_BASE_URL: https://40400meals.com

      - name: Commit Bear publishing state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A -- memory/bear_manifest.json outputs/make_queue

          if git diff --cached --quiet; then
            echo "No publishing-state changes to commit."
            exit 0
          fi

          git commit -m "Update Bear publishing state"
          git pull --no-rebase -X ours origin main
          git push origin main
